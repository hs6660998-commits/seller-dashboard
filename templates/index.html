<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemzy's Media Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

    <div class="hero">
        <img src="{{ url_for('static', filename='media-relations.png') }}" class="hero-img">
        <h1>Gemzy's Wardrobe Wonders</h1>
        <p class="tagline">Fashion • Media • Style • Live Shows</p>
        <a href="https://www.whatnot.com" class="cta-button">Watch Live</a>
    </div>

    <div class="featured">
        <h2>Featured Media</h2>
        <div class="media-grid">
            <div class="media-item">TikTok Clip</div>
            <div class="media-item">Whatnot Highlight</div>
            <div class="media-item">Instagram Post</div>
        </div>
    </div>

    <div class="socials">
        <a href="#">Whatnot</a>
        <a href="#">TikTok</a>
        <a href="#">Instagram</a>
    </div>

</body>
</html>
